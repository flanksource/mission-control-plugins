name: otel
format: flat
index: otel-traces-*
dateField: "@timestamp"
traceIdField: trace_id
spanIdField: span_id
parentIdField: parent_id
serviceField: service_name
operationField: operation_name
statusFields:
  - status
  - status.code
  - attributes.error
selectFields:
  - trace_id
  - span_id
  - parent_id
  - service_name
  - operation_name
params:
  trace_id:
    field: trace_id
    operator: term
    description: Trace ID
  span_id:
    field: span_id
    operator: term
    description: Span ID
  service:
    field: service_name
    operator: term
    description: Service name
  operation:
    field: operation_name
    operator: match_phrase
    description: Operation name
  status:
    field: status
    operator: term
    description: Status
columns:
  - name: Time
    field: timestamp
  - name: Service
    field: service_name
  - name: Operation
    field: operation_name
  - name: Status
    field: status
  - name: Duration
    field: duration_ms
  - name: Trace ID
    field: trace_id
  - name: Span ID
    field: span_id
