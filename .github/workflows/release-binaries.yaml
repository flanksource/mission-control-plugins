name: Release Binaries

on:
  push:
    tags:
      - "*/v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ github.ref_name }} (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            format: tar.gz
          - os: linux
            arch: arm64
            format: tar.gz
          - os: darwin
            arch: amd64
            format: tar.gz
          - os: darwin
            arch: arm64
            format: tar.gz
          - os: windows
            arch: amd64
            format: zip
            ext: .exe
    steps:
      - name: Parse tag
        id: tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          plugin="${TAG%%/v*}"
          version="${TAG#*/}"

          case "$plugin" in
            arthas|golang|inspektor-gadget|kubernetes-logs|postgres|sql-server) ;;
            *) echo "Unsupported plugin tag: $TAG" >&2; exit 1 ;;
          esac

          echo "plugin=$plugin" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ steps.tag.outputs.plugin }}/go.mod
          cache-dependency-path: ${{ steps.tag.outputs.plugin }}/go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build plugin
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          MISSION_CONTROL_PLUGIN_PATH: ${{ github.workspace }}/dist/bin
        run: task plugin:build PLUGIN="${{ steps.tag.outputs.plugin }}" VERSION="${{ steps.tag.outputs.version }}"

      - name: Package artifact
        env:
          PLUGIN: ${{ steps.tag.outputs.plugin }}
          VERSION: ${{ steps.tag.outputs.version }}
          OS: ${{ matrix.os }}
          ARCH: ${{ matrix.arch }}
          EXT: ${{ matrix.ext }}
          FORMAT: ${{ matrix.format }}
        run: |
          name="${PLUGIN}_${VERSION}_${OS}_${ARCH}"
          package_dir="dist/$name"
          mkdir -p "$package_dir"

          cp "dist/bin/$PLUGIN" "$package_dir/$PLUGIN$EXT"
          cp "$PLUGIN/Plugin.yaml" "$package_dir/Plugin.yaml"

          if [ "$FORMAT" = "zip" ]; then
            (cd dist && zip -qr "$name.zip" "$name")
          else
            tar -czf "dist/$name.tar.gz" -C dist "$name"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.tag.outputs.plugin }}_${{ steps.tag.outputs.version }}_${{ matrix.os }}_${{ matrix.arch }}
          path: |
            dist/${{ steps.tag.outputs.plugin }}_${{ steps.tag.outputs.version }}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz
            dist/${{ steps.tag.outputs.plugin }}_${{ steps.tag.outputs.version }}_${{ matrix.os }}_${{ matrix.arch }}.zip
          if-no-files-found: error

  publish:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Parse tag
        id: tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          echo "plugin=${TAG%%/v*}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#*/}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum *.tar.gz *.zip > "${{ steps.tag.outputs.plugin }}_${{ steps.tag.outputs.version }}_checksums.txt"
          else
            shasum -a 256 *.tar.gz *.zip > "${{ steps.tag.outputs.plugin }}_${{ steps.tag.outputs.version }}_checksums.txt"
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          make_latest: false
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/${{ steps.tag.outputs.plugin }}_${{ steps.tag.outputs.version }}_checksums.txt
