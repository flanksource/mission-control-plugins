name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  tag:
    name: Tag release
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semantic.outputs.new-release-published }}
      version: ${{ steps.semantic.outputs.release-version }}
      tag: v${{ steps.semantic.outputs.release-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Create release tag
        id: semantic
        # codfish/semantic-release-action v5.0.0
        # https://github.com/codfish/semantic-release-action/releases/tag/v5.0.0
        uses: codfish/semantic-release-action@6abd188d2458e2fd6c99073454f6cc49196362e8
        with:
          # release.config.cjs uses this non-default preset to parse scoped
          # Conventional Commits like `fix(postgres): ...`.
          additional-packages: |
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.plugin }} ${{ needs.tag.outputs.tag }} (${{ matrix.os }}/${{ matrix.arch }})
    needs: tag
    if: needs.tag.outputs.published == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - arthas
          - golang
          - inspektor-gadget
          - kubernetes-logs
          - opensearch
          - postgres
          - s3
          - sql-server
        os:
          - linux
          - darwin
        arch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag.outputs.tag }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.plugin }}/go.mod
          cache-dependency-path: ${{ matrix.plugin }}/go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build plugin
        env:
          MISSION_CONTROL_PLUGIN_PATH: ${{ github.workspace }}/dist/bin
        run: >-
          task build:plugin:ci
          PLUGIN="${{ matrix.plugin }}"
          VERSION="${{ needs.tag.outputs.tag }}"
          TARGET_GOOS="${{ matrix.os }}"
          TARGET_GOARCH="${{ matrix.arch }}"

      - name: Package artifact
        env:
          PLUGIN: ${{ matrix.plugin }}
          VERSION: ${{ needs.tag.outputs.tag }}
          OS: ${{ matrix.os }}
          ARCH: ${{ matrix.arch }}
        run: |
          name="${PLUGIN}_${VERSION}_${OS}_${ARCH}"
          package_dir="dist/$name"
          mkdir -p "$package_dir"

          cp "dist/bin/$PLUGIN" "$package_dir/${PLUGIN}_mc_plugin"
          cp "$PLUGIN/Plugin.yaml" "$package_dir/Plugin.yaml"

          tar -czf "dist/$name.tar.gz" -C dist "$name"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.plugin }}_${{ needs.tag.outputs.tag }}_${{ matrix.os }}_${{ matrix.arch }}
          path: |
            dist/${{ matrix.plugin }}_${{ needs.tag.outputs.tag }}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  publish-images:
    name: Publish ${{ matrix.plugin }} image
    needs: tag
    if: needs.tag.outputs.published == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - arthas
          - golang
          - inspektor-gadget
          - kubernetes-logs
          - opensearch
          - postgres
          - s3
          - sql-server
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag.outputs.tag }}
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.plugin }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            PLUGIN=${{ matrix.plugin }}
            VERSION=${{ needs.tag.outputs.tag }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/mission-control-plugins/${{ matrix.plugin }}:${{ needs.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/mission-control-plugins/${{ matrix.plugin }}:latest

  publish-charts:
    name: Publish Helm charts
    needs:
      - tag
      - publish-images
    if: needs.tag.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag.outputs.tag }}
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.0.4

      - name: Package Helm charts
        env:
          VERSION: ${{ needs.tag.outputs.version }}
          APP_VERSION: ${{ needs.tag.outputs.tag }}
        run: |
          mkdir -p dist
          for chart in */chart; do
            [ -d "$chart" ] || continue
            python3 - "$chart/Chart.yaml" "$VERSION" "$APP_VERSION" <<'PY'
          import sys, pathlib
          path = pathlib.Path(sys.argv[1])
          version = sys.argv[2]
          app_version = sys.argv[3]
          lines = path.read_text().splitlines()
          out = []
          seen_version = seen_app = False
          for line in lines:
              if line.startswith('version:'):
                  out.append(f'version: {version}')
                  seen_version = True
              elif line.startswith('appVersion:'):
                  out.append(f'appVersion: "{app_version}"')
                  seen_app = True
              else:
                  out.append(line)
          if not seen_version:
              out.append(f'version: {version}')
          if not seen_app:
              out.append(f'appVersion: "{app_version}"')
          path.write_text('\n'.join(out) + '\n')
          PY
            helm package -d dist "$chart"
          done

      - name: Clone charts repo
        uses: actions/checkout@v6
        with:
          repository: "${{ github.repository_owner }}/charts"
          path: chart-index
          token: "${{ secrets.FLANKBOT }}"

      - name: Update chart repo
        run: |
          cd chart-index
          cp ../dist/*.tgz ./
          helm repo index --merge index.yaml .

      - name: Push chart index
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "Release mission-control plugin charts ${{ needs.tag.outputs.tag }}"
          branch: gh-pages
          repository: ./chart-index

  publish-assets:
    name: Publish assets for ${{ needs.tag.outputs.tag }}
    runs-on: ubuntu-latest
    needs:
      - tag
      - build
    if: needs.tag.outputs.published == 'true'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum *.tar.gz > "${{ needs.tag.outputs.tag }}_checksums.txt"
          else
            shasum -a 256 *.tar.gz > "${{ needs.tag.outputs.tag }}_checksums.txt"
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          make_latest: true
          files: |
            dist/*.tar.gz
            dist/${{ needs.tag.outputs.tag }}_checksums.txt
