replicaCount: 1

image:
  repository: ghcr.io/flanksource/mission-control-plugins/arthas
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 9000

plugin:
  # Name of the Plugin resource registered with Mission Control.
  name: arthas
  # Address Mission Control dials to reach this plugin's gRPC server (host:port).
  # Leave empty if Mission Control is configured to reach the plugin another way.
  address: ""

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
extraArgs: []

# Extra volumes and mounts, e.g. to mount a TLS certificate Secret and reference
# it from extraArgs via --serve-tls-cert/--serve-tls-key/--serve-tls-client-ca.
extraVolumes: []
extraVolumeMounts: []
