replicaCount: 1

# How Mission Control runs this plugin:
#   remote - deploy the plugin as an in-cluster Deployment + Service that
#            Mission Control dials over gRPC (default).
#   local  - Mission Control runs the plugin binary itself; no Deployment
#            or Service is created.
mode: remote

image:
  repository: ghcr.io/flanksource/mission-control-plugins/sql-server
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 9000

plugin:
  # Name of the Plugin resource registered with Mission Control.
  name: sql-server
  # Address Mission Control dials to reach this plugin's gRPC server (host:port).
  # Defaults to the in-cluster Service DNS (<release>.<namespace>:<port>) in
  # remote mode. Set explicitly to override.
  address: ""

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
extraArgs: []

# Extra volumes and mounts, e.g. to mount a TLS certificate Secret and reference
# it from extraArgs via --serve-tls-cert/--serve-tls-key/--serve-tls-client-ca.
extraVolumes: []
extraVolumeMounts: []

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
