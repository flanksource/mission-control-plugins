# Registers the kubernetes-logs plugin with Mission Control in remote mode and
# grants it read access to connections.
# spec.address is the gRPC host:port Mission Control dials to reach this plugin.
apiVersion: mission-control.flanksource.com/v1
kind: Plugin
metadata:
  name: {{ .Values.plugin.name }}
spec:
  {{- if eq .Values.mode "remote" }}
  address: {{ .Values.plugin.address | default (printf "%s.%s:%d" (include "plugin.fullname" .) .Release.Namespace (int .Values.service.port)) | quote }}
  {{- else if .Values.plugin.address }}
  address: {{ .Values.plugin.address | quote }}
  {{- end }}
  selector:
    types:
      - Kubernetes::Namespace
      - Kubernetes::Pod
      - Kubernetes::Deployment
      - Kubernetes::StatefulSet
      - Kubernetes::DaemonSet
      - Kubernetes::ReplicaSet
      - Kubernetes::Job
      - Kubernetes::CronJob
---
apiVersion: mission-control.flanksource.com/v1
kind: Permission
metadata:
  name: allow-kubernetes-logs-plugin-to-read-connection
spec:
  subject:
    plugin: {{ .Release.Namespace }}/{{ .Values.plugin.name }}
  actions:
    - read
  object:
    connections:
      - types:
          - MissionControl::Connection
        labelSelector: mission-control/connection-type=kubernetes
